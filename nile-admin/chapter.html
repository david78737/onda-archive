<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONDA Archive · Admin</title>
<style>
  :root {
    --accent:      #00C9BC;
    --accent-dim:  rgba(0,201,188,.15);
    --bg:          #0f1117;
    --surface:     #1a1d27;
    --surface2:    #141720;
    --border:      #252838;
    --border-dim:  #1e2030;
    --ink:         #e8eaf0;
    --ink-mid:     #c8d0e8;
    --muted:       #8890b8;
    --muted-dim:   #6870a0;
    --header-bg:   #1a1d27;
    --header-border: #2a2d3a;
    --admin:       #f0c070;
    --admin-dim:   rgba(240,192,112,.15);
    --danger:      #f07070;
    --danger-dim:  rgba(240,112,112,.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }

  /* ── Header ── */
  header { background: var(--header-bg); border-bottom: 1px solid var(--header-border); padding: 0 24px; }
  .header-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: stretch; gap: 16px; flex-wrap: wrap; min-height: 64px; }
  .header-logo { display: flex; align-items: center; flex-shrink: 0; }
  .header-logo-placeholder { width: 36px; height: 36px; border-radius: 6px; background: var(--accent-dim); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--accent); }
  .header-text { display: flex; flex-direction: column; justify-content: center; gap: 1px; }
  .eyebrow { font-size: 9px; text-transform: uppercase; letter-spacing: .14em; color: var(--muted-dim); }
  .header-title { font-size: 17px; font-weight: 700; color: var(--ink); line-height: 1.2; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .header-count { font-size: 11px; color: var(--muted); white-space: nowrap; }

  .admin-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; background: var(--admin-dim); color: var(--admin); border: 1px solid var(--admin); border-radius: 4px; padding: 3px 8px; display: none; }
  .admin-badge.visible { display: inline-block; }

  .admin-toggle-btn { font-size: 11px; font-weight: 600; background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 5px; padding: 5px 12px; cursor: pointer; white-space: nowrap; transition: border-color .15s, color .15s; }
  .admin-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
  .admin-toggle-btn.active { background: var(--admin-dim); border-color: var(--admin); color: var(--admin); }

  /* ── Auth modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 100%; max-width: 380px; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .modal label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-mid); margin-bottom: 5px; }
  .modal input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--ink); font-size: 14px; border-radius: 6px; padding: 9px 12px; outline: none; transition: border-color .15s; margin-bottom: 12px; font-family: inherit; }
  .modal input:focus { border-color: var(--accent); }
  .modal-btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 600; background: var(--accent); color: #000; border: none; border-radius: 7px; cursor: pointer; font-family: inherit; transition: opacity .15s; }
  .modal-btn:hover { opacity: .85; }
  .modal-btn:disabled { opacity: .5; cursor: default; }
  .modal-cancel { display: block; text-align: center; margin-top: 10px; font-size: 12px; color: var(--muted); cursor: pointer; }
  .modal-cancel:hover { color: var(--ink-mid); }
  .modal-error { font-size: 12px; color: var(--danger); margin-bottom: 10px; display: none; }
  .modal-error.show { display: block; }

  /* ── Search ── */
  .search-bar { background: var(--surface); border-bottom: 1px solid var(--header-border); padding: 8px 24px; }
  .search-bar-inner { max-width: 1000px; margin: 0 auto; }
  .search-bar input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--ink); font-size: 13px; border-radius: 5px; padding: 7px 12px; outline: none; transition: border-color .15s; }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted-dim); }

  /* ── Layout ── */
  .layout { max-width: 1000px; margin: 0 auto; display: flex; align-items: flex-start; height: calc(100vh - 112px); }
  .left-panel { width: 130px; flex-shrink: 0; border-right: 1px solid var(--header-border); height: 100%; overflow-y: auto; padding: 12px 8px 32px; display: flex; flex-direction: column; gap: 16px; }
  .filter-group { display: flex; flex-direction: column; gap: 5px; }
  .filter-label { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted-dim); font-weight: 600; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--ink-mid); border-radius: 4px; padding: 7px 8px; font-size: 11px; cursor: pointer; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background .12s, color .12s, border-color .12s; min-height: 36px; width: 100%; }
  .filter-btn:hover { background: var(--surface2); color: var(--ink); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .right-panel { flex: 1; height: 100%; overflow-y: auto; padding: 10px 20px 48px; min-width: 0; }
  #status { font-size: 12px; color: var(--muted); padding: 6px 0 8px; }
  .sessions { display: flex; flex-direction: column; gap: 7px; }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color .15s; }
  .card.open { border-color: var(--accent); }
  .card.admin-mode { border-color: var(--border); }
  .card-header { display: flex; align-items: flex-start; gap: 10px; padding: 13px 14px; cursor: pointer; -webkit-user-select: none; user-select: none; }
  .chevron { flex-shrink: 0; margin-top: 4px; width: 15px; height: 15px; color: var(--muted-dim); transition: transform .18s; }
  .card.open .chevron { transform: rotate(90deg); }
  .card-meta { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--ink-mid); margin-bottom: 3px; }
  .card-presenter { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .card-token { font-family: monospace; font-size: 10px; color: var(--admin); background: var(--admin-dim); border-radius: 3px; padding: 1px 5px; display: none; }
  .admin-mode-on .card-token { display: inline; }
  .card-avatar { flex-shrink: 0; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: rgba(255,255,255,.85); align-self: center; }
  .card-avatar-photo { flex-shrink: 0; width: 48px; height: 48px; border-radius: 50%; object-fit: cover; align-self: center; }

  .badge { font-size: 10px; font-weight: 600; border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); background: var(--surface2); }
  .badge-pending { border-color: #7a6a3a; color: #f0c070; }
  .badge-done { border-color: #3a7a5a; color: #70f0a0; }

  /* ── Edit panel ── */
  .card-edit { display: none; padding: 0 14px 14px 14px; border-top: 1px solid var(--border); }
  .card.editing .card-edit { display: block; }
  .card.editing { border-color: var(--admin); }

  .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .edit-field { display: flex; flex-direction: column; gap: 4px; }
  .edit-field.full { grid-column: 1 / -1; }
  .edit-field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
  .edit-field input, .edit-field select { background: var(--surface2); border: 1px solid var(--border); color: var(--ink); font-size: 13px; border-radius: 5px; padding: 7px 10px; outline: none; transition: border-color .15s; font-family: inherit; }
  .edit-field input:focus, .edit-field select:focus { border-color: var(--admin); }

  .edit-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .edit-btn { padding: 7px 16px; font-size: 13px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; transition: opacity .15s; }
  .edit-btn:hover { opacity: .85; }
  .edit-btn-save { background: var(--admin); color: #000; }
  .edit-btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .edit-btn-deactivate { background: var(--danger-dim); color: var(--danger); border: 1px solid var(--danger); margin-left: auto; }

  .edit-status { font-size: 12px; color: var(--accent); margin-top: 6px; display: none; }
  .edit-status.show { display: block; }
  .edit-error { font-size: 12px; color: var(--danger); margin-top: 6px; display: none; }
  .edit-error.show { display: block; }

  /* ── Admin edit button on card header ── */
  .card-edit-btn { display: none; margin-left: auto; flex-shrink: 0; padding: 4px 10px; font-size: 11px; font-weight: 600; background: var(--admin-dim); color: var(--admin); border: 1px solid var(--admin); border-radius: 4px; cursor: pointer; }
  .admin-mode-on .card-edit-btn { display: inline-block; }

  .loading, .empty { text-align: center; padding: 4rem 2rem; color: var(--muted-dim); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-logo">
      <div class="header-logo-placeholder" id="logo-placeholder">O</div>
    </div>
    <div class="header-text">
      <div class="eyebrow">ONDA Replay · Chapter Archive</div>
      <div class="header-title" id="header-title">Loading…</div>
    </div>
    <div class="header-right">
      <span class="header-count" id="header-count"></span>
      <span class="admin-badge" id="admin-badge">Admin</span>
      <button class="admin-toggle-btn" id="admin-toggle-btn" onclick="toggleAdmin()">Admin Sign In</button>
    </div>
  </div>
</header>

<div class="search-bar">
  <div class="search-bar-inner">
    <input type="search" id="search-input" placeholder="Search sessions, speakers, topics…" autocomplete="off">
  </div>
</div>

<div class="layout">
  <aside class="left-panel">
    <div class="filter-group">
      <div class="filter-label">Speaker</div>
      <div id="speaker-filters" style="display:flex;flex-direction:column;gap:3px;">
        <button type="button" class="filter-btn active" data-filter="all">All</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Status</div>
      <div id="status-filters" style="display:flex;flex-direction:column;gap:3px;display:none;">
        <button type="button" class="filter-btn active" data-status="all">All</button>
        <button type="button" class="filter-btn" data-status="pending">Pending</button>
        <button type="button" class="filter-btn" data-status="done">Done</button>
        <button type="button" class="filter-btn" data-status="inactive">Inactive</button>
      </div>
    </div>
  </aside>
  <main class="right-panel" id="right-panel">
    <div id="status"></div>
    <div class="sessions" id="sessions"><div class="loading">Loading archive…</div></div>
  </main>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <div class="modal-title">Admin Sign In</div>
    <div class="modal-sub">Enter your phone number to manage session slots.</div>
    <div class="modal-error" id="modal-error"></div>

    <div id="modal-step-phone">
      <label>Phone number</label>
      <input type="tel" id="modal-phone" placeholder="+1 512 555 0100" autocomplete="tel">
      <button class="modal-btn" onclick="adminSendOtp()">Send Code</button>
    </div>

    <div id="modal-step-otp" style="display:none">
      <label>One-time code</label>
      <input type="text" id="modal-otp" placeholder="6-digit code" inputmode="numeric" maxlength="6" autocomplete="one-time-code">
      <button class="modal-btn" onclick="adminVerifyOtp()">Verify</button>
    </div>

    <span class="modal-cancel" onclick="closeAuthModal()">Cancel</span>
  </div>
</div>

<script>
const NILE_API  = 'https://xrxm-29on-xlyt.n7e.xano.io/api:onda-nile';
const NILE_AUTH = 'https://xrxm-29on-xlyt.n7e.xano.io/api:nile';

const params = new URLSearchParams(location.search);
const ORG_L1 = params.get('org_l1') || '';
const ORG_L2 = params.get('org_l2') || '';
const ORG_L3 = params.get('org_l3') || '';

let allSessions = [];
let authToken   = null;
let isAdmin     = false;
const state     = { speaker: 'all', statusFilter: 'all', query: '' };

function normalizePhone(raw) {
  const digits = raw.replace(/\D/g, '');
  if (digits.length === 10) return '+1' + digits;
  if (digits.length === 11 && digits[0] === '1') return '+' + digits;
  return '+' + digits;
}

const _pal = ['#3a5a8a','#5a3a8a','#3a7a5a','#7a4a3a','#6a3a6a','#3a6a7a','#8a5a3a'];
function avatarColor(n) { let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))|0; return _pal[Math.abs(h)%_pal.length]; }
function initials(n) { return n.split(/[\s,]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }
window._thumbErr = function(img) {
  const d = document.createElement('div');
  d.className = 'card-avatar';
  d.style.background = avatarColor(img.dataset.name);
  d.textContent = initials(img.dataset.name);
  img.parentNode.replaceChild(d, img);
};

// ── Admin auth ────────────────────────────────────────────────────────────────
function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    authToken = null;
    document.getElementById('admin-badge').classList.remove('visible');
    document.getElementById('admin-toggle-btn').classList.remove('active');
    document.getElementById('admin-toggle-btn').textContent = 'Admin Sign In';
    document.getElementById('right-panel').classList.remove('admin-mode-on');
    document.getElementById('status-filters').style.display = 'none';
    render();
  } else {
    openAuthModal();
  }
}

function openAuthModal() {
  document.getElementById('auth-modal').classList.add('open');
  document.getElementById('modal-step-phone').style.display = 'block';
  document.getElementById('modal-step-otp').style.display = 'none';
  document.getElementById('modal-error').className = 'modal-error';
  setTimeout(() => document.getElementById('modal-phone').focus(), 50);
}

function closeAuthModal() {
  document.getElementById('auth-modal').classList.remove('open');
}

async function adminSendOtp() {
  const raw = document.getElementById('modal-phone').value.trim();
  if (!raw) { showModalError('Enter your phone number.'); return; }
  const phone = normalizePhone(raw);
  try {
    const r = await fetch(`${NILE_AUTH}/presenter/magic/send`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ contact: phone })
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Failed to send code'); }
    document.getElementById('modal-step-phone').style.display = 'none';
    document.getElementById('modal-step-otp').style.display = 'block';
    setTimeout(() => document.getElementById('modal-otp').focus(), 50);
  } catch(e) { showModalError(e.message); }
}

async function adminVerifyOtp() {
  const raw = document.getElementById('modal-phone').value.trim();
  const otp = document.getElementById('modal-otp').value.trim();
  const phone = normalizePhone(raw);
  try {
    const r = await fetch(`${NILE_AUTH}/presenter/magic/verify`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ contact: phone, code: otp })
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Invalid code'); }
    const data = await r.json();
    authToken = (data.profile_url || '').split('?token=')[1]?.split('&')[0] || null;
    if (!authToken) throw new Error('Auth failed — token not returned');
    isAdmin = true;
    closeAuthModal();
    document.getElementById('admin-badge').classList.add('visible');
    document.getElementById('admin-toggle-btn').classList.add('active');
    document.getElementById('admin-toggle-btn').textContent = 'Exit Admin';
    document.getElementById('right-panel').classList.add('admin-mode-on');
    document.getElementById('status-filters').style.display = 'flex';
    document.getElementById('status-filters').style.flexDirection = 'column';
    document.getElementById('status-filters').style.gap = '3px';
    // Reload with all statuses visible to admin
    await loadSessions(true);
  } catch(e) { showModalError(e.message); }
}

function showModalError(msg) {
  const el = document.getElementById('modal-error');
  el.textContent = msg;
  el.className = 'modal-error show';
}

// ── Filter ────────────────────────────────────────────────────────────────────
function filtered() {
  return allSessions.filter(s => {
    if (state.speaker !== 'all' && (s.presenter || '') !== state.speaker) return false;
    if (isAdmin && state.statusFilter !== 'all' && s.status !== state.statusFilter) return false;
    if (!isAdmin && s.status === 'inactive') return false;
    if (state.query) {
      const q = state.query.toLowerCase();
      const hay = [s.title, s.presenter, s.synopsis].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function buildSpeakerFilters() {
  const speakers = [...new Set(allSessions.map(s => s.presenter).filter(Boolean))].sort();
  const container = document.getElementById('speaker-filters');
  container.innerHTML = '<button type="button" class="filter-btn active" data-filter="all">All</button>';
  speakers.forEach(sp => {
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'filter-btn'; btn.dataset.filter = sp; btn.textContent = sp;
    container.appendChild(btn);
  });
  container.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.speaker = btn.dataset.filter;
      render();
    });
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const rows = filtered();
  document.getElementById('status').textContent = `${rows.length} session${rows.length !== 1 ? 's' : ''}`;
  document.getElementById('header-count').textContent = `${allSessions.length} total`;

  const container = document.getElementById('sessions');
  if (!rows.length) {
    const orgName = [ORG_L3, ORG_L2, ORG_L1].find(Boolean) || 'This archive';
    const isFiltered = state.speaker !== 'all' || state.statusFilter !== 'all' || state.query;
    if (isFiltered) {
      container.innerHTML = '<div class="empty">No sessions match — try a different filter or search term.</div>';
    } else if (isAdmin) {
      container.innerHTML = `
        <div class="empty" style="line-height:1.8">
          <div style="font-size:15px;font-weight:600;color:var(--admin);margin-bottom:8px">No slots created yet for ${orgName}.</div>
          <div style="font-size:13px;color:var(--muted)">Use <a href="../nile-admin/?org_l1=${encodeURIComponent(ORG_L1)}&org_l2=${encodeURIComponent(ORG_L2)}&org_l3=${encodeURIComponent(ORG_L3)}" style="color:var(--accent)">Event Admin → Create Slots</a> to generate the presenter lineup, then return here to fill in names and topics.</div>
        </div>`;
    } else {
      container.innerHTML = `
        <div class="empty" style="line-height:1.8">
          <div style="font-size:15px;font-weight:600;color:var(--ink-mid);margin-bottom:8px">${orgName} hasn't been set up yet.</div>
          <div style="font-size:13px;color:var(--muted)">Sessions will appear here once an administrator creates the event lineup.<br>
          If you manage this archive, use the <strong style="color:var(--ink-mid)">Admin Sign In</strong> button to get started.</div>
        </div>`;
    }
    return;
  }

  container.innerHTML = '';
  rows.forEach(s => {
    const presName = s.presenter || s.presenter_slug?.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) || 'Unassigned';
    const visual = s.photo_url
      ? `<img class="card-avatar card-avatar-photo" loading="lazy" src="${s.photo_url}" alt="${presName}" data-name="${presName}" onerror="window._thumbErr(this)">`
      : `<div class="card-avatar" style="background:${avatarColor(presName)}">${initials(presName)}</div>`;

    const statusBadge = s.status !== 'done'
      ? `<span class="badge badge-${s.status}">${s.status}</span>`
      : `<span class="badge badge-done">Done</span>`;

    const tokenHtml = s.session_token
      ? `<span class="card-token">${s.session_token}</span>`
      : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = s.id;
    card.innerHTML = `
      <div class="card-header">
        <svg class="chevron" viewBox="0 0 20 20" fill="currentColor" style="display:none">
          <path fill-rule="evenodd" d="M7.293 4.293a1 1 0 011.414 0L14 9.586l-5.293 5.293a1 1 0 01-1.414-1.414L11.586 10 6.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
        ${visual}
        <div class="card-meta">
          <div class="card-title">${s.title || 'TBD'}</div>
          <div class="card-presenter">${presName} ${tokenHtml}</div>
          <div>${statusBadge}</div>
        </div>
        <button class="card-edit-btn" onclick="toggleEdit(event, this)">Edit</button>
      </div>
      <div class="card-edit">
        <div class="edit-grid">
          <div class="edit-field full">
            <label>Presenter Name</label>
            <input type="text" name="presenter" value="${s.presenter || ''}" placeholder="Jane Smith">
          </div>
          <div class="edit-field">
            <label>Phone</label>
            <input type="tel" name="phone" value="${s.phone || ''}" placeholder="+1 512 555 0100">
          </div>
          <div class="edit-field">
            <label>Date</label>
            <input type="text" name="date" value="${s.date || ''}" placeholder="July 15, 2026">
          </div>
          <div class="edit-field full">
            <label>Title</label>
            <input type="text" name="title" value="${s.title !== 'TBD' ? (s.title || '') : ''}" placeholder="Presentation title">
          </div>
          <div class="edit-field">
            <label>City</label>
            <input type="text" name="city" value="${s.city || ''}" placeholder="Austin">
          </div>
          <div class="edit-field">
            <label>Status</label>
            <select name="status">
              <option value="pending" ${s.status==='pending'?'selected':''}>Pending</option>
              <option value="recording" ${s.status==='recording'?'selected':''}>Recording</option>
              <option value="done" ${s.status==='done'?'selected':''}>Done</option>
              <option value="inactive" ${s.status==='inactive'?'selected':''}>Inactive</option>
            </select>
          </div>
        </div>
        <div class="edit-actions">
          <button class="edit-btn edit-btn-save" onclick="saveSlot(this)">Save</button>
          <button class="edit-btn edit-btn-cancel" onclick="cancelEdit(this)">Cancel</button>
          <button class="edit-btn edit-btn-deactivate" onclick="deactivateSlot(this)">Deactivate</button>
        </div>
        <div class="edit-status"></div>
        <div class="edit-error"></div>
      </div>`;

    container.appendChild(card);
  });
}

function toggleEdit(event, btn) {
  event.stopPropagation();
  if (!isAdmin) return;
  const card = btn.closest('.card');
  const isOpen = card.classList.contains('editing');
  document.querySelectorAll('.card.editing').forEach(c => c.classList.remove('editing'));
  if (!isOpen) card.classList.add('editing');
}

function cancelEdit(btn) {
  btn.closest('.card').classList.remove('editing');
}

async function saveSlot(btn) {
  const card = btn.closest('.card');
  const id   = card.dataset.id;
  const fields = card.querySelector('.card-edit');
  const statusEl = fields.querySelector('.edit-status');
  const errorEl  = fields.querySelector('.edit-error');
  statusEl.className = 'edit-status'; errorEl.className = 'edit-error';

  const body = {
    presenter: fields.querySelector('[name=presenter]').value.trim(),
    phone:     fields.querySelector('[name=phone]').value.trim(),
    date:      fields.querySelector('[name=date]').value.trim(),
    title:     fields.querySelector('[name=title]').value.trim() || 'TBD',
    city:      fields.querySelector('[name=city]').value.trim(),
    status:    fields.querySelector('[name=status]').value,
  };

  // Auto-generate presenter_slug from name
  if (body.presenter) {
    body.presenter_slug = body.presenter.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  btn.textContent = 'Saving…'; btn.disabled = true;

  try {
    const r = await fetch(`${NILE_API}/nile/session/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
      body: JSON.stringify(body)
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Save failed'); }
    statusEl.textContent = 'Saved ✓'; statusEl.className = 'edit-status show';
    // Update local data
    const s = allSessions.find(x => x.id == id);
    if (s) Object.assign(s, body);
    setTimeout(() => { card.classList.remove('editing'); render(); }, 800);
  } catch(e) {
    errorEl.textContent = e.message; errorEl.className = 'edit-error show';
  } finally {
    btn.textContent = 'Save'; btn.disabled = false;
  }
}

async function deactivateSlot(btn) {
  if (!confirm('Mark this slot as inactive? It will be hidden from the public archive.')) return;
  const card = btn.closest('.card');
  card.querySelector('[name=status]').value = 'inactive';
  await saveSlot(card.querySelector('.edit-btn-save'));
}

// ── Load sessions ─────────────────────────────────────────────────────────────
async function loadSessions(adminMode = false) {
  const qp = new URLSearchParams({ per_page: 1000 });
  if (ORG_L1) qp.set('org_l1', ORG_L1);
  if (ORG_L2) qp.set('org_l2', ORG_L2);
  if (ORG_L3) qp.set('org_l3', ORG_L3);
  if (!adminMode) qp.set('visibility', 'chapter');

  const headers = adminMode && authToken ? { 'Authorization': `Bearer ${authToken}` } : {};
  const r = await fetch(`${NILE_API}/sessions?${qp}`, { headers });
  if (!r.ok) { document.getElementById('sessions').innerHTML = '<div class="empty">Could not load sessions.</div>'; return; }

  allSessions = (await r.json()).map(s => ({
    ...s,
    presenter: s.presenter || (s.presenter_slug ? s.presenter_slug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : ''),
    tags: Array.isArray(s.tags) ? s.tags : [],
  }));

  const defaultTitle = [ORG_L1, ORG_L2, ORG_L3].filter(Boolean).join(' › ') || 'Chapter Archive';
  document.getElementById('header-title').textContent = defaultTitle;
  document.getElementById('logo-placeholder').textContent = (ORG_L1||'O')[0].toUpperCase();

  buildSpeakerFilters();
  render();
}

// Status filter buttons
document.getElementById('status-filters').querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('status-filters').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.statusFilter = btn.dataset.status;
    render();
  });
});

document.getElementById('search-input').addEventListener('input', e => { state.query = e.target.value.trim(); render(); });

// Boot
loadSessions(false);
</script>
</body>
</html>
