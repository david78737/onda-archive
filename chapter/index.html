<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONDA Archive</title>
<style>
  /* ── Theme tokens — overridden at runtime from Xano org config ── */
  :root {
    --accent:      #00C9BC;
    --accent-dim:  rgba(0,201,188,.15);
    --bg:          #0f1117;
    --surface:     #1a1d27;
    --surface2:    #141720;
    --border:      #252838;
    --border-dim:  #1e2030;
    --ink:         #e8eaf0;
    --ink-mid:     #c8d0e8;
    --muted:       #8890b8;
    --muted-dim:   #6870a0;
    --header-bg:   #F2F2F2;
    --header-border: #D0D0D0;
    --header-ink:  #222222;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    padding: 0 24px;
  }
  .header-inner {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    align-items: stretch;
    gap: 16px;
    flex-wrap: wrap;
    min-height: 64px;
  }
  .header-logo {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .header-logo img {
    height: 36px;
    width: auto;
    display: block;
  }
  .header-logo-placeholder {
    width: 36px; height: 36px; border-radius: 6px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: var(--accent);
  }
  .header-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1px;
  }
  .eyebrow {
    font-size: 9px; text-transform: uppercase; letter-spacing: .14em;
    color: #888888;
  }
  .header-title {
    font-size: 17px; font-weight: 700; color: var(--accent);
    line-height: 1.2;
  }
  .header-tagline {
    font-size: 11px; color: #444444;
  }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-count {
    font-size: 11px; color: var(--muted);
    white-space: nowrap;
  }
  .powered-by {
    font-size: 10px; color: var(--muted-dim);
    text-decoration: none; white-space: nowrap;
  }
  .powered-by span { color: var(--accent); }

  /* ── Search bar ── */
  .search-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--header-border);
    padding: 8px 24px;
  }
  .search-bar-inner { max-width: 1000px; margin: 0 auto; }
  .search-bar input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--ink);
    font-size: 13px;
    border-radius: 5px;
    padding: 7px 12px;
    outline: none;
    transition: border-color .15s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted-dim); }

  /* ── Two-panel layout ── */
  .layout {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    height: calc(100vh - 112px);
  }

  /* ── Left panel ── */
  .left-panel {
    width: 130px;
    flex-shrink: 0;
    border-right: 1px solid var(--header-border);
    height: 100%;
    overflow-y: auto;
    padding: 12px 8px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .left-panel::-webkit-scrollbar { width: 3px; }
  .left-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .filter-group { display: flex; flex-direction: column; gap: 5px; }
  .filter-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted-dim); font-weight: 600;
  }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--ink-mid); border-radius: 4px; padding: 7px 8px;
    font-size: 11px; cursor: pointer; text-align: left;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: background .12s, color .12s, border-color .12s;
    min-height: 36px; width: 100%;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--ink); }
  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .tag-list { display: flex; flex-direction: column; gap: 4px; }
  .tag-btn {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface2); border: 1px solid var(--border-dim);
    border-radius: 4px; padding: 7px 8px; font-size: 11px;
    cursor: pointer; width: 100%;
    transition: background .1s, color .1s, border-color .1s;
    white-space: nowrap; overflow: hidden; min-height: 36px;
  }
  .tag-btn span:first-child { overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .tag-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .tag-btn.related { color: var(--ink-mid); border-color: var(--border); }
  .tag-btn.related:hover { background: var(--surface); color: var(--ink); }
  .tag-btn.remaining { color: var(--muted); border-color: var(--border-dim); }
  .tag-btn.remaining:hover { background: var(--surface); color: var(--ink-mid); }
  .tag-count { font-size: 10px; flex-shrink: 0; opacity: .6; margin-left: 3px; }
  .tag-divider { border: none; border-top: 1px solid var(--border-dim); margin: 4px 0; }

  /* ── Right panel ── */
  .right-panel {
    flex: 1; height: 100%; overflow-y: auto;
    padding: 10px 20px 48px; min-width: 0;
  }
  .right-panel::-webkit-scrollbar { width: 3px; }
  .right-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #status { font-size: 12px; color: var(--muted); padding: 6px 0 8px; }

  /* ── Cards ── */
  .sessions { display: flex; flex-direction: column; gap: 7px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; transition: border-color .15s;
  }
  .card.open { border-color: var(--accent); }
  .card-header {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 13px 14px; cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  .card-header:hover .card-title { color: var(--ink); }
  .chevron {
    flex-shrink: 0; margin-top: 4px; width: 15px; height: 15px;
    color: var(--muted-dim); transition: transform .18s;
  }
  .card.open .chevron { transform: rotate(90deg); }
  .card-meta { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--ink-mid); margin-bottom: 3px; transition: color .15s; }
  .card-presenter { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .li-link {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10px; color: var(--accent); text-decoration: none; opacity: .8;
  }
  .li-link:hover { opacity: 1; }
  .li-icon { width: 11px; height: 11px; fill: currentColor; }

  .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; }
  .badge {
    font-size: 10px; font-weight: 600; border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 6px;
    text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted); background: var(--surface2);
  }
  .badge-pending { border-color: #7a6a3a; color: #f0c070; }
  .badge-recording { border-color: #7a3a3a; color: #f09090; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .card-tag {
    font-size: 10px; border: 1px solid var(--border-dim);
    border-radius: 3px; padding: 1px 6px; color: var(--muted-dim);
    background: var(--surface2); cursor: pointer;
    transition: border-color .1s, color .1s;
  }
  .card-tag:hover { border-color: var(--accent); color: var(--ink-mid); }
  .card-tag.lit { border-color: var(--accent); color: var(--accent); }

  .card-avatar {
    flex-shrink: 0; width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: rgba(255,255,255,.85);
    align-self: center; letter-spacing: .03em;
  }
  .card-avatar-photo {
    flex-shrink: 0; width: 48px; height: 48px;
    border-radius: 50%; object-fit: cover; align-self: center;
  }

  .card-body { display: none; padding: 0 14px 14px 38px; }
  .card.open .card-body { display: block; }
  .section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted-dim); margin: 13px 0 5px;
  }
  .synopsis { color: var(--ink-mid); line-height: 1.65; font-size: 13px; }
  .takeaways { list-style: none; }
  .takeaways li {
    color: var(--ink-mid); padding: 3px 0 3px 16px;
    position: relative; font-size: 13px;
  }
  .takeaways li::before { content: "→"; position: absolute; left: 0; color: var(--muted-dim); }
  .who { color: var(--ink-mid); font-style: italic; font-size: 13px; }
  .brief-row { margin-top: 10px; font-size: 12px; color: var(--muted); }

  .action-row {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin-top: 14px; align-items: center;
  }
  .onda-btn { display: inline-block; text-decoration: none; line-height: 0; transition: opacity .15s; }
  .onda-btn:hover { opacity: .85; }
  .onda-btn img { display: block; height: 48px; width: auto; max-width: 100%; }
  .buy-soon {
    font-size: 11px; color: var(--muted); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 10px;
  }

  .loading, .empty {
    text-align: center; padding: 4rem 2rem;
    color: var(--muted-dim); font-size: 14px;
  }

  footer {
    max-width: 1000px; margin: 0 auto; text-align: center;
    padding: 2rem; font-size: 11px; color: var(--muted-dim);
    border-top: 1px solid var(--header-border);
  }
  footer a { color: var(--accent); text-decoration: none; }

  /* ── Pending tile ── */
  .card.pending { opacity: .7; }

  @media (max-width: 480px) {
    .left-panel { width: 110px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-logo" id="header-logo">
      <div class="header-logo-placeholder" id="logo-placeholder">O</div>
    </div>
    <div class="header-text">
      <div class="eyebrow">ONDA Replay · Chapter Archive</div>
      <div class="header-title" id="header-title">Loading…</div>
      <div class="header-tagline" id="header-tagline"></div>
    </div>
    <div class="header-right">
      <span class="header-count" id="header-count"></span>
      <a class="powered-by" href="https://ondareplay.com" target="_blank" rel="noopener">
        Powered by <span>ONDA Replay</span>
      </a>
    </div>
  </div>
</header>

<div class="search-bar">
  <div class="search-bar-inner">
    <input type="search" id="search-input" placeholder="Search sessions, speakers, topics…" autocomplete="off">
  </div>
</div>

<div class="layout">
  <aside class="left-panel">
    <div class="filter-group">
      <div class="filter-label">Speaker</div>
      <div id="speaker-filters" style="display:flex;flex-direction:column;gap:3px;">
        <button type="button" class="filter-btn active" data-filter="all">All</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Topics</div>
      <div class="tag-list" id="tag-list"></div>
    </div>
  </aside>
  <main class="right-panel">
    <div id="status"></div>
    <div class="sessions" id="sessions"><div class="loading">Loading archive…</div></div>
  </main>
</div>

<footer id="footer">
  <a href="https://ondanile.com" target="_blank" rel="noopener">ONDA Nile</a>
  &middot;
  <a href="https://ondareplay.com" target="_blank" rel="noopener">ondareplay.com</a>
</footer>

<script>
const NILE_API = 'https://xrxm-29on-xlyt.n7e.xano.io/api:onda-nile';

// ── Read URL params ────────────────────────────────────────────────────────────
const params  = new URLSearchParams(location.search);
const ORG_L1  = params.get('org_l1') || '';
const ORG_L2  = params.get('org_l2') || '';
const ORG_L3  = params.get('org_l3') || '';

// ── State ─────────────────────────────────────────────────────────────────────
let allSessions = [];
let allTags     = [];
const state     = { speaker: 'all', tags: new Set(), query: '' };

// ── Avatar helpers ─────────────────────────────────────────────────────────────
const _pal = ['#3a5a8a','#5a3a8a','#3a7a5a','#7a4a3a','#6a3a6a','#3a6a7a','#8a5a3a'];
function avatarColor(n) {
  let h = 0;
  for (let i = 0; i < n.length; i++) h = (h * 31 + n.charCodeAt(i)) | 0;
  return _pal[Math.abs(h) % _pal.length];
}
function initials(n) {
  return n.split(/[\s,]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}
window._thumbErr = function(img) {
  const d = document.createElement('div');
  d.className = 'card-avatar';
  d.style.background = avatarColor(img.dataset.name);
  d.textContent = initials(img.dataset.name);
  img.parentNode.replaceChild(d, img);
};

function openOnda(event, url) {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (!isIOS) return true;
  event.preventDefault();
  window.location.href = 'ondareplay://open?url=' + encodeURIComponent(url);
  setTimeout(() => { window.location.href = url; }, 1500);
  return false;
}

// ── Apply org theme from Xano ──────────────────────────────────────────────────
function applyTheme(org) {
  if (!org) return;
  const r = document.documentElement;
  if (org.accent_color)     r.style.setProperty('--accent',      org.accent_color);
  if (org.accent_color)     r.style.setProperty('--accent-dim',  org.accent_color + '26');
  if (org.bg_color)         r.style.setProperty('--bg',          org.bg_color);
  if (org.surface_color)    r.style.setProperty('--surface',     org.surface_color);
  if (org.header_bg_color)  r.style.setProperty('--header-bg',   org.header_bg_color);

  const title = org.display_name || [ORG_L1, ORG_L2, ORG_L3].filter(Boolean).join(' › ');
  document.title = 'ONDA Archive — ' + title;
  document.getElementById('header-title').textContent = title;
  if (org.tagline) document.getElementById('header-tagline').textContent = org.tagline;

  if (org.logo_url) {
    const placeholder = document.getElementById('logo-placeholder');
    const img = document.createElement('img');
    img.src = org.logo_url;
    img.alt = title;
    placeholder.parentNode.replaceChild(img, placeholder);
  } else {
    document.getElementById('logo-placeholder').textContent = (ORG_L1 || 'O')[0].toUpperCase();
  }
}

// ── Filter ─────────────────────────────────────────────────────────────────────
function filtered() {
  return allSessions.filter(s => {
    if (state.speaker !== 'all' && s.presenter !== state.speaker) return false;
    if (state.tags.size > 0 && ![...state.tags].every(t => (s.tags||[]).includes(t))) return false;
    if (state.query) {
      const q   = state.query.toLowerCase();
      const hay = [s.title, s.presenter, s.synopsis, ...(s.tags||[])].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// ── Speaker filter buttons ─────────────────────────────────────────────────────
function buildSpeakerFilters() {
  const speakers = [...new Set(allSessions.map(s => s.presenter))].sort();
  const container = document.getElementById('speaker-filters');
  container.innerHTML = '<button type="button" class="filter-btn active" data-filter="all">All</button>';
  speakers.forEach(sp => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'filter-btn';
    btn.dataset.filter = sp;
    btn.textContent = sp;
    container.appendChild(btn);
  });
  container.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.speaker = btn.dataset.filter;
      render();
    });
  });
}

// ── Tag panel ─────────────────────────────────────────────────────────────────
function renderTags(rows) {
  const visible = new Set(rows.flatMap(s => s.tags || []));
  const el      = document.getElementById('tag-list');
  el.innerHTML  = '';

  const active  = [...state.tags];
  active.forEach(t => el.appendChild(makeTagBtn(t, 'active', null)));

  const related   = allTags.filter(({tag}) => !state.tags.has(tag) && visible.has(tag));
  if (active.length && related.length) el.appendChild(divider());
  related.forEach(({tag,n}) => el.appendChild(makeTagBtn(tag, 'related', n)));

  const remaining = allTags.filter(({tag}) => !state.tags.has(tag) && !visible.has(tag));
  if ((active.length || related.length) && remaining.length) el.appendChild(divider());
  remaining.forEach(({tag,n}) => el.appendChild(makeTagBtn(tag, 'remaining', n)));
}
function makeTagBtn(tag, group, count) {
  const btn = document.createElement('button');
  btn.type  = 'button';
  btn.className = `tag-btn ${group}`;
  btn.dataset.tag = tag;
  btn.innerHTML = `<span>${tag}</span>` + (count !== null ? `<span class="tag-count">${count}</span>` : '');
  btn.addEventListener('click', () => {
    if (state.tags.has(tag)) state.tags.delete(tag); else state.tags.add(tag);
    render();
  });
  return btn;
}
function divider() {
  const hr = document.createElement('hr'); hr.className = 'tag-divider'; return hr;
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  const rows       = filtered();
  const isFiltered = state.speaker !== 'all' || state.tags.size > 0 || state.query;
  document.getElementById('status').textContent =
    isFiltered ? `${rows.length} of ${allSessions.length} sessions` : `${allSessions.length} sessions`;
  document.getElementById('header-count').textContent =
    `${allSessions.length} session${allSessions.length !== 1 ? 's' : ''}`;

  renderTags(rows);

  const container = document.getElementById('sessions');
  if (!rows.length) {
    const orgName = [ORG_L3, ORG_L2, ORG_L1].find(Boolean) || 'This archive';
    const isFiltered = state.speaker !== 'all' || state.tags.size > 0 || state.query;
    if (isFiltered) {
      container.innerHTML = '<div class="empty">No results — try a different filter or search term.</div>';
    } else {
      container.innerHTML = `
        <div class="empty" style="line-height:1.8">
          <div style="font-size:15px;font-weight:600;color:var(--ink-mid);margin-bottom:8px">${orgName} hasn't been set up yet.</div>
          <div style="font-size:13px;color:var(--muted)">Sessions will appear here once an administrator creates the event lineup.<br>
          If you manage this archive, use the <strong style="color:var(--ink-mid)">Admin Sign In</strong> button to get started.</div>
        </div>`;
    }
    return;
  }

  container.innerHTML = '';
  rows.forEach(s => {
    const isPending = s.status === 'pending' || s.status === 'recording';

    const tags = (s.tags || []).map(t =>
      `<span class="card-tag${state.tags.has(t) ? ' lit' : ''}" data-tag="${t}">${t}</span>`
    ).join('');

    const liHtml = s.linkedin
      ? `<a class="li-link" href="${s.linkedin}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
           <svg class="li-icon" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
           LinkedIn
         </a>`
      : '';

    const visual = s.photo
      ? `<img class="card-avatar card-avatar-photo" loading="lazy" src="${s.photo}" alt="${s.presenter}" data-name="${s.presenter}" onerror="window._thumbErr(this)">`
      : `<div class="card-avatar" style="background:${avatarColor(s.presenter||'')}">${initials(s.presenter||'')}</div>`;

    const ondaBtn = (!isPending && s.onda_url)
      ? `<a class="onda-btn" href="${s.onda_url}" target="_blank" rel="noopener"
             onclick="return openOnda(event,'${s.onda_url}')" title="Open in ONDA Replay">
           <img src="../img/onda-download.png" alt="Download ONDA">
         </a>`
      : `<span class="buy-soon">${isPending ? '⏳ Coming soon' : 'Not yet available'}</span>`;

    const statusBadge = isPending
      ? `<span class="badge badge-${s.status}">${s.status === 'recording' ? '● Recording' : 'Coming Soon'}</span>`
      : '';

    const card = document.createElement('div');
    card.className = 'card' + (isPending ? ' pending' : '');
    card.innerHTML =
      `<div class="card-header">
        <svg class="chevron" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M7.293 4.293a1 1 0 011.414 0L14 9.586l-5.293 5.293a1 1 0 01-1.414-1.414L11.586 10 6.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
        ${visual}
        <div class="card-meta">
          <div class="card-title">${s.title}</div>
          <div class="card-presenter"><span>${s.presenter}</span>${liHtml}</div>
          <div class="badges">${statusBadge}</div>
          <div class="card-tags">${tags}</div>
        </div>
      </div>
      <div class="card-body">
        ${s.synopsis ? `<div class="section-label">Synopsis</div><div class="synopsis">${s.synopsis}</div>` : ''}
        ${(s.takeaways||[]).length ? `<div class="section-label">Key Takeaways</div><ul class="takeaways">${s.takeaways.map(t=>`<li>${t}</li>`).join('')}</ul>` : ''}
        ${s.who ? `<div class="section-label">Best For</div><div class="who">${s.who}</div>` : ''}
        ${s.brief ? `<div class="brief-row">${s.brief}</div>` : ''}
        <div class="action-row">${ondaBtn}</div>
      </div>`;

    card.querySelector('.card-header').addEventListener('click', () => card.classList.toggle('open'));
    card.querySelectorAll('.card-tag').forEach(chip => {
      chip.addEventListener('click', e => {
        e.stopPropagation();
        const t = chip.dataset.tag;
        if (state.tags.has(t)) state.tags.delete(t); else state.tags.add(t);
        render();
      });
    });

    container.appendChild(card);
  });
}

// ── Search ─────────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  state.query = e.target.value.trim();
  render();
});

// ── Boot ───────────────────────────────────────────────────────────────────────
(async () => {
  // Set default title from URL params while loading
  const defaultTitle = [ORG_L1, ORG_L2, ORG_L3].filter(Boolean).join(' › ') || 'Chapter Archive';
  document.getElementById('header-title').textContent = defaultTitle;
  document.title = 'ONDA Archive — ' + defaultTitle;

  // Map org URL params to sessions.json org name
  const ORG_NAME_MAP = {
    'elevate|summit|elevate-summit': 'Elevate Summit',
    'productcamp|austin|pca':        'ProductCamp Austin',
    'toastmasters|austin|chapter-47':'Toastmasters',
  };
  const orgKey = [ORG_L1, ORG_L2, ORG_L3].join('|');
  const orgName = ORG_NAME_MAP[orgKey] || null;

  // Fetch sessions.json + org identity in parallel
  const identityParams = new URLSearchParams({ org_l1: ORG_L1, org_l2: ORG_L2, org_l3: ORG_L3 });
  const [sessResp, identityResp] = await Promise.all([
    fetch('../ondanile/sessions.json').catch(() => null),
    fetch(`https://xrxm-29on-xlyt.n7e.xano.io/api:nile/org/identity?${identityParams}`).catch(() => null),
  ]);

  // Apply org skin if available
  if (identityResp && identityResp.ok) {
    try {
      const skin = await identityResp.json();
      applyTheme({
        accent_color:    skin.accent_color,
        display_name:    skin.wordmark,
        tagline:         skin.tagline,
        logo_url:        skin.logo_url,
      });
    } catch(_) {}
  } else {
    document.getElementById('header-title').textContent = defaultTitle;
    document.getElementById('logo-placeholder').textContent = (ORG_L1||'O')[0].toUpperCase();
  }

  if (!sessResp || !sessResp.ok) {
    document.getElementById('sessions').innerHTML =
      `<div class="empty">Could not load sessions. Try again shortly.</div>`;
    return;
  }

  const allData = await sessResp.json();
  const filtered = orgName
    ? allData.filter(s => (s.org || '').toLowerCase().includes(orgName.toLowerCase()) ||
                          (s.source || '').toLowerCase().includes(orgName.toLowerCase().split(' ')[0]))
    : allData;

  allSessions = filtered.map(s => ({
    ...s,
    presenter: s.presenter || 'Unknown',
    onda_url: s.onda_url || s.file_url || s.session_url || null,
    tags: Array.isArray(s.tags) ? s.tags : [],
    takeaways: Array.isArray(s.takeaways) ? s.takeaways : [],
  }));

  // Build ranked tag list
  const tagCount = {};
  allSessions.forEach(s => (s.tags||[]).forEach(t => { tagCount[t] = (tagCount[t]||0)+1; }));
  allTags = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).map(([tag,n])=>({tag,n}));

  buildSpeakerFilters();
  render();
})();
</script>
</body>
</html>
